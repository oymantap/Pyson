name: Build Pyson APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Install NDK & CMake
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ runner.workspace }}/../android-sdk/ndk/25.2.9519653

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pyson-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
